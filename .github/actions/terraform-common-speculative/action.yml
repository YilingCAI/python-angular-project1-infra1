name: Terraform Common Setup Speculative

description: Shared setup for speculative Terraform plans only (no backend auth, no remote backend init).

inputs:
  target_environment:
    description: Terraform target environment (dev/staging/prod)
    required: true
  jwt_secret_key:
    description: JWT secret injected as TF_VAR_jwt_secret_key
    required: true
  enable_security_checks:
    description: Run fmt/checkov/tflint/trivy checks
    required: false
    default: "false"
  checkov_enforcement:
    description: "Checkov enforcement mode: advisory (soft-fail) or blocking"
    required: false
    default: "advisory"

runs:
  using: composite
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.10.5

    - name: Configure Terraform cache
      shell: bash
      run: |
        mkdir -p "$HOME/.terraform.d/plugin-cache"
        echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> "$GITHUB_ENV"

    - name: Restore Terraform plugin cache
      uses: actions/cache@v4
      with:
        path: ~/.terraform.d/plugin-cache
        key: ${{ runner.os }}-terraform-${{ inputs.target_environment }}-${{ hashFiles('**/.terraform.lock.hcl') }}
        restore-keys: |
          ${{ runner.os }}-terraform-${{ inputs.target_environment }}-
          ${{ runner.os }}-terraform-

    - name: Isolate backend-disabled Terraform data dir
      shell: bash
      run: |
        echo "TF_DATA_DIR=/tmp/tfdata-${{ inputs.target_environment }}-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_ENV"

    - name: Remove stale backend metadata
      shell: bash
      run: |
        rm -f "environments/${{ inputs.target_environment }}/backend.hcl"
        rm -f "environments/${{ inputs.target_environment }}/.terraform/terraform.tfstate"
        rm -f "environments/${{ inputs.target_environment }}/.terraform/terraform.tfstate.backup"

    - name: Export sensitive Terraform vars
      shell: bash
      run: echo "TF_VAR_jwt_secret_key=${{ inputs.jwt_secret_key }}" >> "$GITHUB_ENV"

    - name: Terraform fmt
      if: ${{ inputs.enable_security_checks == 'true' }}
      shell: bash
      run: terraform -chdir="environments/${{ inputs.target_environment }}" fmt -check -recursive

    - name: Terraform init (speculative)
      shell: bash
      run: |
        terraform -chdir="environments/${{ inputs.target_environment }}" init \
          -backend=false \
          -reconfigure \
          -upgrade

    - name: Terraform validate
      shell: bash
      run: terraform -chdir="environments/${{ inputs.target_environment }}" validate

    - name: Run Checkov scan
      if: ${{ inputs.enable_security_checks == 'true' }}
      shell: bash
      run: |
        if [ "${{ inputs.checkov_enforcement }}" = "advisory" ]; then
          CHECKOV_MODE="--soft-fail"
        elif [ "${{ inputs.checkov_enforcement }}" = "blocking" ]; then
          CHECKOV_MODE=""
        else
          echo "Invalid checkov_enforcement value '${{ inputs.checkov_enforcement }}'. Use 'advisory' or 'blocking'." >&2
          exit 1
        fi

        docker run --rm \
          -v "$PWD":/tf \
          bridgecrew/checkov:latest \
          -d /tf/environments/${{ inputs.target_environment }} \
          --framework terraform \
          --quiet \
          ${CHECKOV_MODE}

    - name: Setup TFLint
      if: ${{ inputs.enable_security_checks == 'true' }}
      uses: terraform-linters/setup-tflint@v4
      with:
        tflint_version: v0.55.1

    - name: Restore TFLint plugin cache
      if: ${{ inputs.enable_security_checks == 'true' }}
      uses: actions/cache@v4
      with:
        path: ~/.tflint.d/plugins
        key: ${{ runner.os }}-tflint-${{ inputs.target_environment }}-${{ hashFiles('**/.terraform.lock.hcl') }}
        restore-keys: |
          ${{ runner.os }}-tflint-${{ inputs.target_environment }}-
          ${{ runner.os }}-tflint-

    - name: Run TFLint
      if: ${{ inputs.enable_security_checks == 'true' }}
      shell: bash
      run: |
        tflint --chdir="environments/${{ inputs.target_environment }}" --init
        tflint --chdir="environments/${{ inputs.target_environment }}" --format compact

    - name: Dependency vulnerability scan
      if: ${{ inputs.enable_security_checks == 'true' }}
      uses: aquasecurity/trivy-action@0.24.0
      with:
        scan-type: fs
        scan-ref: .
        scanners: vuln
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        format: table
