name: Terraform Apply Reusable

on:
  workflow_call:
    inputs:
      target_environment:
        description: Terraform target environment (dev/staging/prod)
        required: true
        type: string
      github_environment:
        description: Optional GitHub Environment name override
        required: false
        type: string
        default: ""
      operation:
        description: Terraform operation to run (drift/apply)
        required: true
        type: string
      enable_security_checks:
        description: Run checkov/tflint/trivy checks
        required: false
        type: boolean
        default: false
      checkov_enforcement:
        description: Checkov enforcement mode (advisory or blocking)
        required: false
        type: string
        default: advisory
      fail_on_drift:
        description: Fail workflow when drift is detected
        required: false
        type: boolean
        default: true
      apply_use_saved_plan:
        description: Apply using previously generated saved plan artifact
        required: false
        type: boolean
        default: false
      saved_plan_artifact_name:
        description: Artifact name containing tfplan.binary
        required: false
        type: string
        default: ""
    secrets:
      JWT_SECRET_KEY:
        required: true
      TERRAFORM_STATE_BUCKET:
        required: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform:
    name: Terraform ${{ inputs.target_environment }} (${{ inputs.operation }})
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-state-${{ inputs.target_environment }}
      cancel-in-progress: false
    environment: ${{ inputs.github_environment != '' && inputs.github_environment || inputs.target_environment }}
    env:
      TF_ENV: ${{ inputs.target_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform common setup and checks
        uses: ./.github/actions/terraform-setup-common
        with:
          target_environment: ${{ inputs.target_environment }}
          operation: ${{ inputs.operation }}
          aws_region: ${{ vars.AWS_REGION }}
          terraform_state_bucket: ${{ secrets.TERRAFORM_STATE_BUCKET }}
          jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}
          enable_security_checks: ${{ inputs.enable_security_checks }}
          checkov_enforcement: ${{ inputs.checkov_enforcement }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role_session_name_prefix: gha-terraform

      - name: Detect Terraform var-file
        if: inputs.operation == 'drift' || inputs.operation == 'apply'
        id: vars
        shell: bash
        run: |
          if [ -f "environments/${TF_ENV}/terraform.tfvars" ]; then
            echo "var_file_arg=-var-file=terraform.tfvars" >> "$GITHUB_OUTPUT"
          else
            echo "var_file_arg=" >> "$GITHUB_OUTPUT"
            echo "terraform.tfvars not found in environments/${TF_ENV}; running with defaults and other provided vars."
          fi

      - name: Download saved plan artifact
        if: inputs.operation == 'apply' && inputs.apply_use_saved_plan && inputs.saved_plan_artifact_name != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.saved_plan_artifact_name }}
          path: environments/${{ inputs.target_environment }}

      - name: Verify saved plan file
        if: inputs.operation == 'apply' && inputs.apply_use_saved_plan
        shell: bash
        run: |
          [ -f "environments/${TF_ENV}/tfplan.binary" ] || {
            echo "Saved plan file not found at environments/${TF_ENV}/tfplan.binary" >&2
            exit 1
          }

      - name: Terraform drift plan
        if: inputs.operation == 'drift'
        id: drift
        shell: bash
        run: |
          # Run plan and capture exit code without pipes.
          # GitHub Actions bash uses: bash --noprofile --norc -e -o pipefail {0}
          # Even with set +eo pipefail, some runners re-enable them.
          # Using a temp script file avoids all shell-option quirks.
          PLAN_FILE="environments/${TF_ENV}/plan-output.txt"

          PLAN_EXIT=0
          terraform -chdir="environments/${TF_ENV}" plan -detailed-exitcode \
            ${{ steps.vars.outputs.var_file_arg }} \
            -lock-timeout=5m \
            -no-color > "${PLAN_FILE}" 2>&1 || PLAN_EXIT=$?

          # Always print the plan to the job log
          cat "${PLAN_FILE}"

          echo "plan_exit=${PLAN_EXIT}" >> "$GITHUB_OUTPUT"

          if [ "${PLAN_EXIT}" -eq 1 ]; then
            echo "::error::Terraform plan errored in ${TF_ENV}. See logs above."
            exit 1
          fi
          # Exit 0 = no drift, exit 2 = drift detected.
          # Do NOT exit here — let downstream steps produce the summary
          # and artifact before the job is failed.

      - name: Upload drift artifact
        if: inputs.operation == 'drift' && always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-drift-${{ inputs.target_environment }}
          path: environments/${{ inputs.target_environment }}/plan-output.txt
          retention-days: 30

      - name: Write drift job summary
        if: inputs.operation == 'drift' && always()
        shell: bash
        run: |
          PLAN_FILE="environments/${TF_ENV}/plan-output.txt"
          PLAN_EXIT="${{ steps.drift.outputs.plan_exit }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          {
            echo "## :mag: Terraform Drift Report — \`${TF_ENV}\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Environment** | \`${TF_ENV}\` |"
            echo "| **Triggered by** | \`${{ github.event_name }}\` |"
            echo "| **Commit** | [\`${GITHUB_SHA::8}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| **Run** | [#${{ github.run_number }}](${RUN_URL}) |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${PLAN_EXIT}" = "0" ]; then
            {
              echo "### :white_check_mark: No drift detected"
              echo ""
              echo "Infrastructure in \`${TF_ENV}\` matches Terraform state."
            } >> "$GITHUB_STEP_SUMMARY"

          elif [ "${PLAN_EXIT}" = "2" ]; then
            # Parse counts from the plan summary line
            # e.g. "Plan: 0 to add, 3 to change, 0 to destroy."
            SUMMARY_LINE=$(grep -E "^Plan:" "${PLAN_FILE}" || true)
            TO_ADD=$(echo "${SUMMARY_LINE}"     | grep -oP '\d+(?= to add)'     || echo "0")
            TO_CHANGE=$(echo "${SUMMARY_LINE}"  | grep -oP '\d+(?= to change)'  || echo "0")
            TO_DESTROY=$(echo "${SUMMARY_LINE}" | grep -oP '\d+(?= to destroy)' || echo "0")

            # Extract list of drifted resource addresses
            DRIFTED_RESOURCES=$(grep -E "^  # .+ will be (updated|destroyed|created|replaced)" "${PLAN_FILE}" \
              | sed -E 's/^  # (.+) will be.*/\1/' \
              | sort \
              || true)

            {
              echo "### :rotating_light: Drift detected"
              echo ""
              echo "**${SUMMARY_LINE}**"
              echo ""
              echo "| Change type | Count |"
              echo "|---|:---:|"
              echo "| :green_circle: To add | ${TO_ADD} |"
              echo "| :yellow_circle: To change | ${TO_CHANGE} |"
              echo "| :red_circle: To destroy | ${TO_DESTROY} |"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"

            if [ -n "${DRIFTED_RESOURCES}" ]; then
              {
                echo "#### Affected resources"
                echo ""
                echo '```'
                echo "${DRIFTED_RESOURCES}"
                echo '```'
                echo ""
              } >> "$GITHUB_STEP_SUMMARY"
            fi

            {
              echo "> :paperclip: Full diff available in artifact **\`terraform-drift-${TF_ENV}\`**"
              echo ""
              echo "> **Action required:** Review the drift and either:"
              echo "> 1. Run \`terraform apply\` to reconcile state, or"
              echo "> 2. Import / update Terraform config to reflect the intentional change."
            } >> "$GITHUB_STEP_SUMMARY"

          else
            {
              echo "### :x: Plan did not complete"
              echo ""
              echo "Terraform exited with code \`${PLAN_EXIT}\`. Check the job logs for errors."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail on detected drift
        if: always() && inputs.operation == 'drift' && inputs.fail_on_drift == true && steps.drift.outputs.plan_exit == '2'
        shell: bash
        run: |
          echo "::error::Drift detected in ${TF_ENV}. Review the job summary and artifact terraform-drift-${TF_ENV}."
          exit 1

      - name: Terraform apply
        if: inputs.operation == 'apply'
        shell: bash
        run: |
          if [ "${{ inputs.apply_use_saved_plan }}" = "true" ]; then
            terraform -chdir="environments/${TF_ENV}" apply \
              -lock-timeout=5m \
              -auto-approve \
              -input=false \
              "tfplan.binary"
          else
            terraform -chdir="environments/${TF_ENV}" apply \
              ${{ steps.vars.outputs.var_file_arg }} \
              -lock-timeout=5m \
              -auto-approve \
              -input=false
          fi

      - name: Workflow summary
        if: always() && inputs.operation == 'apply'
        shell: bash
        run: |
          echo "## Terraform Workflow Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${TF_ENV}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Operation: ${{ inputs.operation }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"