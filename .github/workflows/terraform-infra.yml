name: Terraform Infra

on:
  schedule:
    - cron: '30 2 * * *'
  pull_request:
    branches: [main]
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'Makefile'
      - 'README.md'
      - '.github/workflows/terraform-infra.yml'
  push:
    branches: [main]
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'Makefile'
      - 'README.md'
      - '.github/workflows/terraform-infra.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, prod]
      action:
        description: Terraform action
        required: true
        type: choice
        options: [plan, apply]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-plan:
    name: Nightly Drift Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      matrix:
        environment: [staging, prod]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PLAN || secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Export Terraform runtime vars
        shell: bash
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "TF_VAR_environment=${{ matrix.environment }}" >> "$GITHUB_ENV"
          echo "TF_VAR_aws_region=${{ vars.AWS_REGION }}" >> "$GITHUB_ENV"
          echo "TF_VAR_ecr_repository_url=${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/mypythonproject1/backend" >> "$GITHUB_ENV"
          echo "TF_VAR_frontend_ecr_repository_url=${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/mypythonproject1/frontend" >> "$GITHUB_ENV"
          echo "TF_VAR_jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.environment }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TERRAFORM_LOCK_TABLE }}" \
            -upgrade

      - name: Terraform validate
        run: terraform validate

      - name: Terraform drift plan
        id: drift
        shell: bash
        run: |
          set +e
          terraform plan -detailed-exitcode -var-file="envs/${{ matrix.environment }}.tfvars" -no-color > plan-output.txt 2>&1
          PLAN_EXIT=$?
          set -e

          if [ "$PLAN_EXIT" -eq 1 ]; then
            echo "Terraform plan failed"
            cat plan-output.txt
            exit 1
          fi

          echo "plan_exit=$PLAN_EXIT" >> "$GITHUB_OUTPUT"

      - name: Write drift summary
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.drift.outputs.plan_exit }}" = "0" ]; then
            echo "### ✅ Nightly Drift Check — ${{ matrix.environment }}" >> "$GITHUB_STEP_SUMMARY"
            echo "No drift detected." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.drift.outputs.plan_exit }}" = "2" ]; then
            echo "### ❌ Nightly Drift Check — ${{ matrix.environment }}" >> "$GITHUB_STEP_SUMMARY"
            echo "Drift detected. Review artifact: terraform-drift-${{ matrix.environment }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ⚠️ Nightly Drift Check — ${{ matrix.environment }}" >> "$GITHUB_STEP_SUMMARY"
            echo "Plan did not complete normally. Check job logs." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload drift plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-drift-${{ matrix.environment }}
          path: plan-output.txt

      - name: Fail on detected drift
        if: steps.drift.outputs.plan_exit == '2'
        run: |
          echo "❌ Drift detected for ${{ matrix.environment }}"
          exit 1

  validate-plan:
    name: Validate & Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow sanity check
        if: github.event_name == 'pull_request'
        run: make workflow-check

      - name: Resolve target environment
        id: target
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TF_ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TF_ENV="prod"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            TF_ENV="prod"
          else
            TF_ENV="prod"
          fi
          echo "env=${TF_ENV}" >> "$GITHUB_OUTPUT"
          echo "Using environment: ${TF_ENV}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PLAN || secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Export Terraform runtime vars
        shell: bash
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "TF_VAR_environment=${{ steps.target.outputs.env }}" >> "$GITHUB_ENV"
          echo "TF_VAR_aws_region=${{ vars.AWS_REGION }}" >> "$GITHUB_ENV"
          echo "TF_VAR_ecr_repository_url=${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/mypythonproject1/backend" >> "$GITHUB_ENV"
          echo "TF_VAR_frontend_ecr_repository_url=${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/mypythonproject1/frontend" >> "$GITHUB_ENV"
          echo "TF_VAR_jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=${{ steps.target.outputs.env }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TERRAFORM_LOCK_TABLE }}" \
            -upgrade

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -var-file="envs/${{ steps.target.outputs.env }}.tfvars" \
            -no-color 2>&1 | tee plan-output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ steps.target.outputs.env }}
          path: plan-output.txt

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const bodyPlan = fs.readFileSync('plan-output.txt', 'utf8').substring(0, 65000);
            const body = `## 🔍 Terraform Plan (prod)\n\n\`\`\`hcl\n${bodyPlan}\n\`\`\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## 🔍 Terraform Plan (prod)';
            const existing = comments.data.find(c => c.user?.type === 'Bot' && c.body?.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [validate-plan]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: ${{ github.event_name == 'push' && 'production' || (github.event.inputs.environment == 'prod' && 'production' || 'staging') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Export Terraform runtime vars
        shell: bash
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TF_ENV="${{ github.event.inputs.environment }}"
          else
            TF_ENV="prod"
          fi
          echo "TF_VAR_environment=${TF_ENV}" >> "$GITHUB_ENV"
          echo "TF_ENV=${TF_ENV}" >> "$GITHUB_ENV"
          echo "TF_VAR_aws_region=${{ vars.AWS_REGION }}" >> "$GITHUB_ENV"
          echo "TF_VAR_ecr_repository_url=${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/mypythonproject1/backend" >> "$GITHUB_ENV"
          echo "TF_VAR_frontend_ecr_repository_url=${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/mypythonproject1/frontend" >> "$GITHUB_ENV"
          echo "TF_VAR_jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=${TF_ENV}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TERRAFORM_LOCK_TABLE }}" \
            -upgrade

      - name: Terraform apply
        run: |
          terraform apply \
            -var-file="envs/${TF_ENV}.tfvars" \
            -auto-approve \
            -input=false
