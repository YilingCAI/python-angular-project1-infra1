name: Terraform Plan Apply

on:
  # Triggered automatically after "Terraform Plan" completes on a push to main.
  # Only fires when the plan workflow ran due to a push (not a scheduled drift
  # check or a manual workflow_dispatch plan run).
  workflow_run:
    workflows: ["Terraform Plan Speculative"]
    types: [completed]
    branches: [main]

  # Allows manual one-environment applies without a preceding plan workflow run.
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, prod, all]
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write
  pull-requests: write
  actions: read  # Required to download artifacts from the triggering plan run

concurrency:
  group: terraform-apply-${{ inputs.environment }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Real plans on push to main (saves plan artifacts for apply) ─────────
  plan-dev-main:
    if: (github.event_name.workflow_run.status == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev' && inputs.action == 'plan') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'all' && inputs.action == 'plan')
    uses: ./.github/workflows/terraform-plan-reusable.yml
    with:
      target_environment: dev
      github_environment: dev
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: false
    secrets: inherit

  plan-staging-main:
    needs: [plan-dev-main]
    if: always() && ((github.event_name.workflow_run.status == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && needs.plan-dev-main.result == 'success') || (github.event_name == 'workflow_dispatch' && (inputs.environment == 'staging' || inputs.environment == 'all') && inputs.action == 'plan'))
    uses: ./.github/workflows/terraform-plan-reusable.yml
    with:
      target_environment: staging
      github_environment: staging
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: false
    secrets: inherit

  plan-prod-main:
    needs: [plan-staging-main]
    if: always() && ((github.event_name.workflow_run.status == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && needs.plan-staging-main.result == 'success') || (github.event_name == 'workflow_dispatch' && (inputs.environment == 'prod' || inputs.environment == 'all') && inputs.action == 'plan'))
    uses: ./.github/workflows/terraform-plan-reusable.yml
    with:
      target_environment: prod
      github_environment: prod
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: false
    secrets: inherit
  
  # ─── Apply dev ────────────────────────────────────────────────────────────
  apply-dev:
    # workflow_run: only when triggered by a push event (not schedule or manual plan)
    # workflow_dispatch: when the user explicitly targets dev
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev' && inputs.action == 'apply') || 
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'all' && inputs.action == 'apply')
    uses: ./.github/workflows/terraform-apply-reusable.yml
    with:
      target_environment: dev
      github_environment: dev
      operation: apply
      checkov_enforcement: advisory
      apply_use_saved_plan: ${{ github.event_name == 'workflow_run' }}
      saved_plan_artifact_name: terraform-plan-dev
    secrets: inherit

  # ─── Apply staging ────────────────────────────────────────────────────────
  apply-staging:
    needs: [apply-dev]
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging' && inputs.action == 'apply') || 
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'all' && inputs.action == 'apply')
    uses: ./.github/workflows/terraform-apply-reusable.yml
    with:
      target_environment: staging
      github_environment: staging
      operation: apply
      checkov_enforcement: advisory
      apply_use_saved_plan: ${{ github.event_name == 'workflow_run' }}
      saved_plan_artifact_name: terraform-plan-staging
    secrets: inherit

  # ─── Apply prod ───────────────────────────────────────────────────────────
  apply-prod:
    needs: [apply-staging]
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod' && inputs.action == 'apply') || 
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'all' && inputs.action == 'apply')
    uses: ./.github/workflows/terraform-apply-reusable.yml
    with:
      target_environment: prod
      github_environment: prod
      operation: apply
      checkov_enforcement: advisory
      apply_use_saved_plan: ${{ github.event_name == 'workflow_run' }}
      saved_plan_artifact_name: terraform-plan-prod
    secrets: inherit
