name: Terraform Plan Reusable

on:
  workflow_call:
    inputs:
      target_environment:
        description: Terraform target environment for plan checks
        required: true
        type: string
      github_environment:
        description: Optional GitHub Environment name override
        required: false
        type: string
        default: ""
      enable_security_checks:
        description: Run checkov/tflint/trivy checks
        required: false
        type: boolean
        default: true
      enable_pr_comment:
        description: Post plan comment to PR
        required: false
        type: boolean
        default: true
      enable_infracost:
        description: Run Infracost when API key exists
        required: false
        type: boolean
        default: true
    secrets:
      JWT_SECRET_KEY:
        required: true
      TERRAFORM_STATE_BUCKET:
        required: true
      INFRACOST_API_KEY:
        required: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan ${{ inputs.target_environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment != '' && inputs.github_environment || inputs.target_environment }}
    env:
      TF_ENV: ${{ inputs.target_environment }}
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN_PLAN || secrets.AWS_OIDC_ROLE_ARN || secrets.AWS_ROLE_TO_ASSUME_PLAN || secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-terraform-plan-${{ inputs.target_environment }}-${{ github.run_id }}
          audience: sts.amazonaws.com

      - name: Export sensitive Terraform vars
        run: echo "TF_VAR_jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Render backend config
        run: |
          cat > environments/${TF_ENV}/backend.hcl <<'EOF'
          bucket         = "${{ secrets.TERRAFORM_STATE_BUCKET }}"
          region         = "${{ vars.AWS_REGION }}"
          dynamodb_table = "mypythonproject1-terraform-lock-${TF_ENV}"
          encrypt        = true
          EOF

      - name: Terraform fmt
        if: inputs.enable_security_checks
        run: terraform -chdir="environments/${TF_ENV}" fmt -check -recursive

      - name: Terraform init
        run: |
          terraform -chdir="environments/${TF_ENV}" init \
            -backend-config=backend.hcl \
            -backend-config="key=${TF_ENV}/terraform.tfstate" \
            -upgrade

      - name: Terraform validate
        run: terraform -chdir="environments/${TF_ENV}" validate

      - name: Run Checkov scan
        if: inputs.enable_security_checks
        run: |
          docker run --rm \
            -v "$PWD":/tf \
            bridgecrew/checkov:latest \
            -d /tf \
            --framework terraform \
            --quiet

      - name: Setup TFLint
        if: inputs.enable_security_checks
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.1

      - name: Run TFLint
        if: inputs.enable_security_checks
        run: |
          tflint --chdir="environments/${TF_ENV}" --init
          tflint --chdir="environments/${TF_ENV}" --format compact

      - name: Dependency vulnerability scan
        if: inputs.enable_security_checks
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table

      - name: Terraform plan
        run: |
          terraform -chdir="environments/${TF_ENV}" plan \
            -var-file="terraform.tfvars" \
            -out="tfplan.binary" \
            -no-color 2>&1 | tee "environments/${TF_ENV}/plan-output.txt"

      - name: Setup Infracost
        if: inputs.enable_infracost && env.INFRACOST_API_KEY != ''
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ env.INFRACOST_API_KEY }}

      - name: Infracost breakdown
        if: inputs.enable_infracost && env.INFRACOST_API_KEY != ''
        run: |
          infracost breakdown \
            --path="environments/${TF_ENV}" \
            --terraform-plan-flags="-var-file=terraform.tfvars" \
            --format=json \
            --out-file="environments/${TF_ENV}/infracost.json"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ inputs.target_environment }}
          path: |
            environments/${TF_ENV}/plan-output.txt
            environments/${TF_ENV}/tfplan.binary
            environments/${TF_ENV}/infracost.json

      - name: Post plan to PR
        if: inputs.enable_pr_comment && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const bodyPlan = fs.readFileSync('environments/${{ env.TF_ENV }}/plan-output.txt', 'utf8').substring(0, 65000);
            const marker = '## Terraform Plan (${{ env.TF_ENV }})';
            const body = `${marker}\n\n\`\`\`hcl\n${bodyPlan}\n\`\`\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.user?.type === 'Bot' && c.body?.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Workflow summary
        if: always()
        shell: bash
        run: |
          echo "## Terraform Workflow Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${TF_ENV}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Operation: plan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
