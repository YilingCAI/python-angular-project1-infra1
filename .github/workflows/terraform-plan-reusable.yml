name: Terraform Plan Reusable

on:
  workflow_call:
    inputs:
      target_environment:
        description: Terraform target environment for plan checks
        required: true
        type: string
      github_environment:
        description: Optional GitHub Environment name override
        required: false
        type: string
        default: ""
      enable_security_checks:
        description: Run checkov/tflint/trivy checks
        required: false
        type: boolean
        default: true
      checkov_enforcement:
        description: Checkov enforcement mode (advisory or blocking)
        required: false
        type: string
        default: advisory
      speculative_plan:
        description: Run speculative plan mode (no saved plan, no lock)
        required: false
        type: boolean
        default: false
      enable_pr_comment:
        description: Post plan comment to PR
        required: false
        type: boolean
        default: true
      enable_infracost:
        description: Run Infracost when API key exists
        required: false
        type: boolean
        default: true
    secrets:
      JWT_SECRET_KEY:
        required: true
      TERRAFORM_STATE_BUCKET:
        required: false
      INFRACOST_API_KEY:
        required: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan ${{ inputs.target_environment }}
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-state-${{ inputs.target_environment }}
      cancel-in-progress: false
    environment: ${{ !inputs.speculative_plan && (inputs.github_environment != '' && inputs.github_environment || inputs.target_environment) || '' }}
    env:
      TF_ENV: ${{ inputs.target_environment }}
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform common setup and checks
        uses: ./.github/actions/terraform-common
        with:
          target_environment: ${{ inputs.target_environment }}
          operation: plan
          aws_region: ${{ vars.AWS_REGION }}
          terraform_state_bucket: ${{ secrets.TERRAFORM_STATE_BUCKET }}
          terraform_init_backend: ${{ !inputs.speculative_plan }}
          aws_auth_required: ${{ !inputs.speculative_plan }}
          jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}
          enable_security_checks: ${{ inputs.enable_security_checks }}
          checkov_enforcement: ${{ inputs.checkov_enforcement }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role_session_name_prefix: gha-terraform-plan

      - name: Terraform shared plan steps
        uses: ./.github/actions/terraform-plan-common
        with:
          target_environment: ${{ inputs.target_environment }}
          speculative_plan: ${{ inputs.speculative_plan }}
          enable_infracost: ${{ inputs.enable_infracost }}
          infracost_api_key: ${{ secrets.INFRACOST_API_KEY }}
          enable_pr_comment: ${{ inputs.enable_pr_comment }}

      - name: Workflow summary
        if: always()
        shell: bash
        run: |
          echo "## Terraform Workflow Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${TF_ENV}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.speculative_plan }}" = "true" ]; then
            echo "- Operation: plan (speculative)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Operation: plan" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
