name: Terraform Plan Speculative Reusable

on:
  workflow_call:
    inputs:
      target_environment:
        description: Terraform target environment for speculative plan checks
        required: true
        type: string
      enable_security_checks:
        description: Run checkov/tflint/trivy checks
        required: false
        type: boolean
        default: true
      checkov_enforcement:
        description: Checkov enforcement mode (advisory or blocking)
        required: false
        type: string
        default: advisory
      enable_pr_comment:
        description: Post plan comment to PR
        required: false
        type: boolean
        default: true
      enable_infracost:
        description: Run Infracost when API key exists
        required: false
        type: boolean
        default: true
    secrets:
      JWT_SECRET_KEY:
        required: true
      INFRACOST_API_KEY:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan-speculative:
    name: Terraform Plan ${{ inputs.target_environment }} (speculative)
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-state-${{ inputs.target_environment }}
      cancel-in-progress: false
    env:
      TF_ENV: ${{ inputs.target_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform common setup and checks
        uses: ./.github/actions/terraform-common
        with:
          target_environment: ${{ inputs.target_environment }}
          operation: plan
          terraform_plan_speculative: true
          aws_auth_required: false
          jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}
          enable_security_checks: ${{ inputs.enable_security_checks }}
          checkov_enforcement: ${{ inputs.checkov_enforcement }}

      - name: Terraform shared plan steps
        uses: ./.github/actions/terraform-plan-common
        with:
          target_environment: ${{ inputs.target_environment }}
          speculative_plan: true
          enable_infracost: ${{ inputs.enable_infracost }}
          infracost_api_key: ${{ secrets.INFRACOST_API_KEY }}
          enable_pr_comment: ${{ inputs.enable_pr_comment }}

      - name: Workflow summary
        if: always()
        shell: bash
        run: |
          echo "## Terraform Workflow Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${TF_ENV}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Operation: plan (speculative)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Init mode: backend=false" >> "$GITHUB_STEP_SUMMARY"
          echo "- AWS auth: disabled" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
