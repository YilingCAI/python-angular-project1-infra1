name: Terraform Plan Speculative

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - '**/.terraform.lock.hcl'
      - '!bootstrap/**'
  push:
    branches: [main]
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - '**/.terraform.lock.hcl'
      - '!bootstrap/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, prod, all]
      action:
        description: Terraform action
        required: true
        type: choice
        options: [plan]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-plan-${{ inputs.environment }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Speculative plans on pull requests (no backend state writes) ─────────

  plan-dev:
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'all')
    uses: ./.github/workflows/terraform-plan-speculative-reusable.yml
    with:
      target_environment: dev
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: true
      enable_infracost: true
    secrets: inherit

  plan-staging:
    needs: [plan-dev]
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'all')
    uses: ./.github/workflows/terraform-plan-speculative-reusable.yml
    with:
      target_environment: staging
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: false
      enable_infracost: true
    secrets: inherit

  plan-prod:
    needs: [plan-staging]
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'all')
    uses: ./.github/workflows/terraform-plan-speculative-reusable.yml
    with:
      target_environment: prod
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: false
      enable_infracost: true
    secrets: inherit