name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - '**/.terraform.lock.hcl'
      - '!bootstrap/**'
  push:
    branches: [main]
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - '**/.terraform.lock.hcl'
      - '!bootstrap/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, prod]
      action:
        description: Terraform action
        required: true
        type: choice
        options: [plan]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-plan-${{ inputs.environment }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Speculative plans on pull requests (no backend state writes) ─────────

  plan-dev:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    uses: ./.github/workflows/terraform-plan-speculative-reusable.yml
    with:
      target_environment: dev
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: true
      enable_infracost: true
    secrets: inherit

  plan-staging:
    needs: [plan-dev]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    uses: ./.github/workflows/terraform-plan-speculative-reusable.yml
    with:
      target_environment: staging
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: false
      enable_infracost: true
    secrets: inherit

  plan-prod:
    needs: [plan-staging]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    uses: ./.github/workflows/terraform-plan-speculative-reusable.yml
    with:
      target_environment: prod
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: false
      enable_infracost: true
    secrets: inherit

  # ─── Real plans on push to main (saves plan artifacts for apply) ──────────

  plan-dev-main:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev' && inputs.action == 'plan')
    uses: ./.github/workflows/terraform-plan-reusable.yml
    with:
      target_environment: dev
      github_environment: dev
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: false
    secrets: inherit

  plan-staging-main:
    needs: [plan-dev-main]
    if: always() && ((github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.plan-dev-main.result == 'success') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging' && inputs.action == 'plan'))
    uses: ./.github/workflows/terraform-plan-reusable.yml
    with:
      target_environment: staging
      github_environment: staging
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: false
    secrets: inherit

  plan-prod-main:
    needs: [plan-staging-main]
    if: always() && ((github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.plan-staging-main.result == 'success') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod' && inputs.action == 'plan'))
    uses: ./.github/workflows/terraform-plan-reusable.yml
    with:
      target_environment: prod
      github_environment: prod
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: false
    secrets: inherit
