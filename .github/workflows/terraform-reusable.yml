name: Terraform Reusable

on:
  workflow_call:
    inputs:
      target_environment:
        description: Terraform target environment (dev/staging/prod)
        required: true
        type: string
      github_environment:
        description: Optional GitHub Environment name override
        required: false
        type: string
        default: ""
      operation:
        description: Terraform operation to run
        required: true
        type: string
      enable_security_checks:
        description: Run checkov/tflint/trivy checks
        required: false
        type: boolean
        default: false
      enable_pr_comment:
        description: Post plan comment to PR
        required: false
        type: boolean
        default: false
      enable_infracost:
        description: Run Infracost when API key exists
        required: false
        type: boolean
        default: false
      fail_on_drift:
        description: Fail workflow when drift is detected
        required: false
        type: boolean
        default: true
    secrets:
      JWT_SECRET_KEY:
        required: true
      TERRAFORM_STATE_BUCKET:
        required: true
      INFRACOST_API_KEY:
        required: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform:
    name: Terraform ${{ inputs.target_environment }} (${{ inputs.operation }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment != '' && inputs.github_environment || inputs.target_environment }}
    env:
      TF_ENV: ${{ inputs.target_environment }}
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Resolve AWS role ARN
        id: role
        shell: bash
        env:
          OPERATION: ${{ inputs.operation }}
          AWS_OIDC_ROLE_ARN_PLAN: ${{ secrets.AWS_OIDC_ROLE_ARN_PLAN }}
          AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          AWS_ROLE_TO_ASSUME_PLAN: ${{ secrets.AWS_ROLE_TO_ASSUME_PLAN }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ "$OPERATION" = "apply" ]; then
            ROLE_ARN="${AWS_OIDC_ROLE_ARN:-${AWS_ROLE_TO_ASSUME:-}}"
          else
            ROLE_ARN="${AWS_OIDC_ROLE_ARN_PLAN:-${AWS_OIDC_ROLE_ARN:-${AWS_ROLE_TO_ASSUME_PLAN:-${AWS_ROLE_TO_ASSUME:-}}}}"
          fi

          if [ -z "$ROLE_ARN" ]; then
            echo "Missing AWS role secret for operation '$OPERATION'." >&2
            exit 1
          fi

          if ! printf '%s' "$ROLE_ARN" | grep -Eq '^arn:aws:iam::[0-9]{12}:role/.+'; then
            echo "Configured role ARN is invalid. Ensure the secret value is a full IAM role ARN like arn:aws:iam::123456789012:role/GitHubActionsRole." >&2
            exit 1
          fi

          echo "role_arn=$ROLE_ARN" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.role.outputs.role_arn }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-terraform-${{ inputs.target_environment }}-${{ github.run_id }}
          audience: sts.amazonaws.com

      - name: Export sensitive Terraform vars
        run: echo "TF_VAR_jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Render backend config
        run: |
          cat > environments/${TF_ENV}/backend.hcl <<'EOF'
          bucket         = "${{ secrets.TERRAFORM_STATE_BUCKET }}"
          region         = "${{ vars.AWS_REGION }}"
          dynamodb_table = "mypythonproject1-terraform-lock-${TF_ENV}"
          encrypt        = true
          EOF

      - name: Terraform fmt
        if: inputs.enable_security_checks
        run: terraform -chdir="environments/${TF_ENV}" fmt -check -recursive

      - name: Terraform init
        run: |
          terraform -chdir="environments/${TF_ENV}" init \
            -backend-config=backend.hcl \
            -backend-config="key=${TF_ENV}/terraform.tfstate" \
            -upgrade

      - name: Terraform validate
        run: terraform -chdir="environments/${TF_ENV}" validate

      - name: Run Checkov scan
        if: inputs.enable_security_checks
        run: |
          docker run --rm \
            -v "$PWD":/tf \
            bridgecrew/checkov:latest \
            -d /tf \
            --framework terraform \
            --quiet

      - name: Setup TFLint
        if: inputs.enable_security_checks
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.1

      - name: Run TFLint
        if: inputs.enable_security_checks
        run: |
          tflint --chdir="environments/${TF_ENV}" --init
          tflint --chdir="environments/${TF_ENV}" --format compact

      - name: Dependency vulnerability scan
        if: inputs.enable_security_checks
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table

      - name: Terraform plan
        if: inputs.operation == 'plan'
        run: |
          terraform -chdir="environments/${TF_ENV}" plan \
            -var-file="terraform.tfvars" \
            -out="tfplan.binary" \
            -no-color 2>&1 | tee "environments/${TF_ENV}/plan-output.txt"

      - name: Terraform drift plan
        if: inputs.operation == 'drift'
        id: drift
        shell: bash
        run: |
          set +e
          terraform -chdir="environments/${TF_ENV}" plan -detailed-exitcode -var-file="terraform.tfvars" -no-color > "environments/${TF_ENV}/plan-output.txt" 2>&1
          PLAN_EXIT=$?
          set -e

          if [ "$PLAN_EXIT" -eq 1 ]; then
            echo "Terraform plan failed"
            cat "environments/${TF_ENV}/plan-output.txt"
            exit 1
          fi

          echo "plan_exit=$PLAN_EXIT" >> "$GITHUB_OUTPUT"

      - name: Setup Infracost
        if: inputs.operation == 'plan' && inputs.enable_infracost && env.INFRACOST_API_KEY != ''
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ env.INFRACOST_API_KEY }}

      - name: Infracost breakdown
        if: inputs.operation == 'plan' && inputs.enable_infracost && env.INFRACOST_API_KEY != ''
        run: |
          infracost breakdown \
            --path="environments/${TF_ENV}" \
            --terraform-plan-flags="-var-file=terraform.tfvars" \
            --format=json \
            --out-file="environments/${TF_ENV}/infracost.json"

      - name: Upload plan artifact
        if: inputs.operation == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ inputs.target_environment }}
          path: |
            environments/${TF_ENV}/plan-output.txt
            environments/${TF_ENV}/tfplan.binary
            environments/${TF_ENV}/infracost.json

      - name: Upload drift plan artifact
        if: inputs.operation == 'drift'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-drift-${{ inputs.target_environment }}
          path: environments/${TF_ENV}/plan-output.txt

      - name: Post plan to PR
        if: inputs.operation == 'plan' && inputs.enable_pr_comment && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const bodyPlan = fs.readFileSync('environments/${{ env.TF_ENV }}/plan-output.txt', 'utf8').substring(0, 65000);
            const marker = '## Terraform Plan (${{ env.TF_ENV }})';
            const body = `${marker}\n\n\`\`\`hcl\n${bodyPlan}\n\`\`\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.user?.type === 'Bot' && c.body?.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Write drift summary
        if: inputs.operation == 'drift' && always()
        shell: bash
        run: |
          if [ "${{ steps.drift.outputs.plan_exit }}" = "0" ]; then
            echo "### Nightly Drift Check - ${TF_ENV}" >> "$GITHUB_STEP_SUMMARY"
            echo "No drift detected." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.drift.outputs.plan_exit }}" = "2" ]; then
            echo "### Nightly Drift Check - ${TF_ENV}" >> "$GITHUB_STEP_SUMMARY"
            echo "Drift detected. Review artifact: terraform-drift-${TF_ENV}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Nightly Drift Check - ${TF_ENV}" >> "$GITHUB_STEP_SUMMARY"
            echo "Plan did not complete normally. Check job logs." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail on detected drift
        if: inputs.operation == 'drift' && inputs.fail_on_drift && steps.drift.outputs.plan_exit == '2'
        run: |
          echo "Drift detected for ${TF_ENV}"
          exit 1

      - name: Terraform apply
        if: inputs.operation == 'apply'
        run: |
          terraform -chdir="environments/${TF_ENV}" apply \
            -var-file="terraform.tfvars" \
            -auto-approve \
            -input=false

      - name: Workflow summary
        if: always()
        shell: bash
        run: |
          echo "## Terraform Workflow Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${TF_ENV}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Operation: ${{ inputs.operation }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.operation }}" = "drift" ] && [ "${{ steps.drift.outputs.plan_exit }}" = "2" ]; then
            echo "- Drift: detected" >> "$GITHUB_STEP_SUMMARY"
          fi